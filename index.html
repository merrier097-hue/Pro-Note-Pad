<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sweet Life Novels</title>
<style>
body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f0f0f0;}
header { background: #ff6f61; color: white; padding: 10px; text-align: center;}
#storyContainer { display: flex; flex-wrap: wrap; justify-content: center; padding: 20px;}
.story-card { background: white; border-radius: 10px; margin: 10px; padding: 15px; width: 200px; cursor: pointer; transition: transform 0.2s;}
.story-card:hover { transform: scale(1.05);}
#addStoryBtn { position: fixed; bottom: 20px; right: 20px; font-size: 30px; cursor: pointer; background: #ff6f61; color: white; border: none; border-radius: 50%; width: 60px; height: 60px;}
#about { padding: 20px; text-align: center;}
</style>
</head>
<body>
<header>
<h1>Sweet Life Novels</h1>
<button onclick="showAbout()">About</button>
</header>

<div id="storyContainer"></div>

<button id="addStoryBtn" onclick="addStory()" style="display:none;">+</button>

<div id="about" style="display:none;">
<h2>About Sweet Life Novels</h2>
<p>Created by Tallen. Enjoy your sweet life with stories!</p>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// Firebase config
const firebaseConfig = {
  databaseURL: "https://novel-pro-4f878-default-rtdb.firebaseio.com/"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// Ownership password check
let isOwner = false;
const password = prompt("Enter ownership password if you are the owner:");

if(password === "1988Henry") {
  isOwner = true;
  document.getElementById("addStoryBtn").style.display = "block";
}

// Load stories
function loadStories() {
  db.ref('stories').once('value', snapshot => {
    const container = document.getElementById("storyContainer");
    container.innerHTML = "";
    snapshot.forEach(snap => {
      const story = snap.val();
      const card = document.createElement("div");
      card.className = "story-card";
      card.style.background = randomColor();
      card.innerHTML = `<h3>${story.title}</h3><p>${story.category}</p>`;
      card.onclick = () => alert(story.content);
      container.appendChild(card);
    });
  });
}

function randomColor() {
  const colors = ['#f8b400','#6a2c70','#b83b5e','#0b3954','#ff6f61'];
  return colors[Math.floor(Math.random()*colors.length)];
}

// Add story
function addStory() {
  const title = prompt("Story Title:");
  const category = prompt("Category:");
  const content = prompt("Story Content:");
  if(title && category && content) {
    const newStory = {title, category, content};
    db.ref('stories').push(newStory);
    loadStories();
  }
}

// About page toggle
function showAbout() {
  const about = document.getElementById("about");
  about.style.display = about.style.display === "none" ? "block" : "none";
}

loadStories();
</script>
</body>
</html>
